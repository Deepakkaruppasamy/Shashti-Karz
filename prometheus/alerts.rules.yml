groups:
  - name: infrastructure-alerts
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 80% (current value: {{ $value }}%)"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 85% (current value: {{ $value }}%)"

  - name: application-alerts
    rules:
      - alert: HighApiErrorRate
        expr: rate(http_requests_total{status_code=~"5.*"}[5m]) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High API Error Rate"
          description: "More than 5% of requests to {{ $labels.route }} are failing with 5xx errors."

  - name: business-alerts
    rules:
      - alert: ZeroBookingsIn24Hours
        expr: increase(shashti_karz_bookings_total[24h]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No bookings received in the last 24 hours"
          description: "Business anomaly detected: 0 bookings processed in 24 hours."
