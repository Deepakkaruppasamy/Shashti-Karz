global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alerts.rules.yml'

alerting:
  alertmanagers:
    - scheme: http
      static_configs:
        - targets:
          - "alertmanager:9093"

scrape_configs:
  - job_name: 'shashti-karz-prod'
    metrics_path: '/api/metrics'
    scheme: https
    static_configs:
      - targets: ['shashtikarz.app']
    params:
      # Replace YOUR_SECRET_TOKEN with the value of METRICS_SECRET set on your hosting platform
      token: ['YOUR_SECRET_TOKEN']
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

