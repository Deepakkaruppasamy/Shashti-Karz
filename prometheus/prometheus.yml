global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'alerts.rules.yml'

alerting:
  alertmanagers:
    - scheme: http
      static_configs:
        - targets:
          - "alertmanager:9093"

scrape_configs:
  - job_name: 'shashti-karz-local'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['app:3000']
    params:
      token: ['your_metrics_secret_here']

  # Production scrape disabled until METRICS_SECRET on Render is updated
  - job_name: 'shashti-karz-prod'
    metrics_path: '/api/metrics'
    scheme: https
    static_configs:
      - targets: ['shashtikarz.app']
    params:
      token: ['your_metrics_secret_here']

 

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']


