# ─────────────────────────────────────────────────────────────
# Ingress — Routes external traffic to services
# Uses NGINX Ingress Controller with TLS via cert-manager
# ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shashti-karz-ingress
  namespace: shashti-karz
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"   # Auto TLS via Let's Encrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - shashtikarz.app
        - www.shashtikarz.app
      secretName: shashti-karz-tls
  rules:
    # ── Main App ──────────────────────────────
    - host: shashtikarz.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shashti-karz-service
                port:
                  number: 80

    # ── www redirect ──────────────────────────
    - host: www.shashtikarz.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shashti-karz-service
                port:
                  number: 80
---
# ─────────────────────────────────────────────────────────────
# Internal Ingress — Grafana (accessible at /grafana path)
# ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: shashti-karz
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: monitoring.shashtikarz.app
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-service
                port:
                  number: 3001
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: prometheus-service
                port:
                  number: 9090
