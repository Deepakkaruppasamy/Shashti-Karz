# ─────────────────────────────────────────────────────────────
# Kubernetes Secret — App Environment Variables
# NOTE: Values must be base64 encoded.
# Run: echo -n "your-value" | base64
# NEVER commit real values — use kubectl apply with CI/CD secrets
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: shashti-karz-secrets
  namespace: shashti-karz
  labels:
    app: shashti-karz
type: Opaque
stringData:
  # Using stringData so K8s auto-encodes to base64
  # Fill these in via Jenkins/CI pipeline — do NOT hardcode here
  NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
  SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
  STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
  NEXT_PUBLIC_APP_URL: "https://shashtikarz.app"
  METRICS_SECRET: "${METRICS_SECRET}"
